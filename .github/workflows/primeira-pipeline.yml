name: Check Secret Availability

on:
  pull_request:

jobs:
  check-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Check if secret exists
        env:
          SECRET_TEST: ${{ secrets.SECRET_TEST }}
        run: |
          if [ -z "$SECRET_TEST" ]; then
            echo "SECRET_TEST not available"
          else
            echo "SECRET_TEST available"
          fi
